name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-python-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python-service

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('python-service/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python tests
      run: python -m pytest --tb=short -v

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: python-test-results
        path: python-service/test-results.xml
        retention-days: 7

  test-nextjs-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-app

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run Next.js tests
      run: npm run test -- --coverage --watchAll=false

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: nextjs-coverage
        path: web-app/coverage/
        retention-days: 7

  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-python-service, test-nextjs-app]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Python dependencies
      working-directory: ./python-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Next.js dependencies
      working-directory: ./web-app
      run: npm ci

    - name: Run integration tests
      run: |
        # Start Python service in background
        cd python-service
        python app.py &
        PYTHON_PID=$!

        # Wait for service to start
        sleep 5

        # Run Next.js integration tests
        cd ../web-app
        npm run test -- __tests__/integration-*.test.ts --watchAll=false

        # Clean up
        kill $PYTHON_PID

    - name: Upload integration test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: |
          web-app/test-results/
          python-service/test-results/
        retention-days: 7

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web-app/package-lock.json

    - name: Install Next.js dependencies
      working-directory: ./web-app
      run: npm ci

    - name: Build Next.js app
      working-directory: ./web-app
      run: npm run build

    - name: Deploy to Vercel (placeholder)
      run: |
        echo "Next.js app built successfully"
        echo "Ready for deployment to Vercel, Railway, or similar platform"
        echo "Python service ready for deployment to Railway, Render, or Fly.io"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: nextjs-build
        path: web-app/.next/
        retention-days: 7