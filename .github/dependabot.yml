version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/python-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "Eg0420"
    assignees:
      - "Eg0420"

  # Next.js dependencies
  - package-ecosystem: "npm"
    directory: "/web-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "Eg0420"
    assignees:
      - "Eg0420"
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      testing:
        patterns:
          - "@testing-library/*"
          - "jest*"